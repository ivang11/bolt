name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: bolt-linux-x64
          - os: macos-15-intel
            asset: bolt-macos-x64
          - os: macos-14
            asset: bolt-macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: ui
        run: npm ci && npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/bolt ${{ matrix.asset }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
